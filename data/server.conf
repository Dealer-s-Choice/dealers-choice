bind_address = NULL
port = 22777
end_of_game_timeout = 15
action_timeout = 30
action_timeout_max = 3
dealer_timeout = 30
ante = 50
bringin_amount = 50
starting_coins = 20000
max_raises = 3
bet_amounts = list, 100, 250, 500
password =
max_connections_per_minute = 10
max_connections_per_ip = 0

# Name shown to players (LAN discovery + the registry).
server_name = Dealer's Choice server

# Answer LAN discovery probes so players on your local network find this server
# in their list. Set to no for an internet-only server. The
# --disable-lan-discovery flag (or DC_DISABLE_LAN_DISCOVERY) overrides this off.
lan_discovery = yes

# To publish this server to a registry so internet players can find it, set the
# registry list in common.conf (shared with the client). Pass --disable-publish
# to opt out even when a registry is configured.
