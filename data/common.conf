# Settings shared by the Dealer's Choice client and the headless server.

# Server registries (directory servers). Both the client (to browse internet
# servers on the connect screen) and the headless server (to publish itself)
# read this list. One registry per line: the host is the value, with an
# optional port as a comma attribute (the default port is 22070). Repeat the
# line for more registries. Leave it commented out for LAN-only / no registry.
# registry = registry.example.org
# registry = 203.0.113.5, 22071

# LAN discovery UDP port. Both the client (which broadcasts to find servers on
# the local network) and the headless server (which binds it to answer) read
# this, so it must be the same on every machine on your LAN. Defaults to 22787
# if unset. The server's --discovery-port flag overrides this value.
# lan_discovery_port = 22787
registry = registry.dealers-choice-foss.dev
