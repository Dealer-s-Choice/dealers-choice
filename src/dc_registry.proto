syntax = "proto3";

// --- Server registry (directory server) ---
//
// These messages were split out of dc_protocol.proto so the registry/directory
// protocol is versioned and evolved independently of the in-game protocol.
// Field numbers are preserved verbatim from their original definitions: the
// protobuf wire format keys on per-message field numbers, not on the file a
// message lives in, so moving them here with identical numbers produces
// byte-for-byte identical wire encodings. (See REGISTRY_PROTOCOL_VERSION in
// src/net/registry.h; that constant is unchanged by this split.)

// A game server announces (and heartbeats) itself to a registry. The server's
// IP is taken from the announce connection's source address by the registry,
// never trusted from the payload.
message ServerAnnounce {
  uint32 registry_version = 1; // REGISTRY_PROTOCOL_VERSION
  string name = 2;             // advertised server name (sanitized by registry)
  uint32 tcp_port = 3;         // the game port the server listens on
  uint32 player_count = 4;
  uint32 max_players = 5;
  bool password_protected = 6;
  bool in_progress = 7;
  uint64 start_time = 8; // server process start, unix seconds (0 = unknown);
                         // registry/client derive uptime from it
}

// One verified server in the registry's list.
message ServerEntry {
  string ip = 1;
  uint32 tcp_port = 2;
  string name = 3;
  uint32 player_count = 4;
  uint32 max_players = 5;
  bool password_protected = 6;
  bool in_progress = 7;
  uint64 start_time = 8; // server process start, unix seconds (0 = unknown)
}

// A client asks the registry for the current list.
message ServerListRequest {
  uint32 registry_version = 1;
}

message ServerList {
  repeated ServerEntry servers = 1;
}
