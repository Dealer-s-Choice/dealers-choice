syntax = "proto3";

message Card {
  int32 face_val = 1;
  int32 suit = 2;
}

message Hand {
  repeated Card card = 1;
}

message Player {
  string nick = 1;
  int32 id = 2;
  Hand hand = 3;
  int32 coins = 4;
  bool in = 5;
  bool winner = 6;
  bool is_connected = 7;
  bool is_admin = 8;
}

message GameState {
  uint32 pot = 1;
  int32 dealer_id = 2;
  bool at_menu = 3;
  uint32 player_count = 4;
  uint32 raises_remaining = 5;
  uint32 prev_bet_amount = 6;
  bool winner_declared = 7;
  reserved 8;
  repeated Player player = 9;
  int32 round_opener_id = 10;
}

message GameSettings {
  int32 client_id = 1;
  uint32 action_timeout_ms = 2;
  reserved 3;
  uint32 end_of_game_timeout_ms = 4;
  repeated uint32 bet_amounts = 5;
}

enum MessageType {
  MSG_PING_REQUEST = 0;
  MSG_PING_RESPONSE = 1;
  MSG_PING_BROADCAST = 2;
}

message PingRequest {
  uint32 timestamp = 1; // SDL_GetTicks() when sent
}

message PingResponse {
  uint32 timestamp = 1; // Echo timestamp from request
}

message PingEntry {
  uint32 player_id = 1;
  uint32 ping_ms = 2;
}

message PingBroadcast {
  repeated PingEntry entries = 1;
}

message ActionAnnounce {
  int32 player_id = 1;
  int32 verb = 2;     // EActionAnnounce_t
  uint32 amount = 3;  // bet/raise/complete size, or cards drawn; 0 if unused
}

// --- Server registry (directory server) ---

// A game server announces (and heartbeats) itself to a registry. The server's
// IP is taken from the announce connection's source address by the registry,
// never trusted from the payload.
message ServerAnnounce {
  uint32 registry_version = 1; // REGISTRY_PROTOCOL_VERSION
  string name = 2;             // advertised server name (sanitized by registry)
  uint32 tcp_port = 3;         // the game port the server listens on
  uint32 player_count = 4;
  uint32 max_players = 5;
  bool password_protected = 6;
  bool in_progress = 7;
}

// One verified server in the registry's list.
message ServerEntry {
  string ip = 1;
  uint32 tcp_port = 2;
  string name = 3;
  uint32 player_count = 4;
  uint32 max_players = 5;
  bool password_protected = 6;
  bool in_progress = 7;
}

// A client asks the registry for the current list.
message ServerListRequest {
  uint32 registry_version = 1;
}

message ServerList {
  repeated ServerEntry servers = 1;
}
