syntax = "proto3";

message Card {
  int32 face_val = 1;
  int32 suit = 2;
}

message Hand {
  repeated Card card = 1;
}

message Player {
  string nick = 1;
  int32 id = 2;
  Hand hand = 3;
  int32 coins = 4;
  bool in = 5;
  uint32 total_paid = 6;
  bool winner = 7;
  bool has_checked = 8;
  bool is_connected = 9;
}

message GameState {
  uint32 pot = 1;
  int32 dealer_id = 2;
  uint32 starting_turn_id = 3;
  int32 turn_id = 4;
  bool at_menu = 5;
  uint32 player_count = 6;
  uint32 total_bets_plus_raises = 7;
  bool winner_declared = 8;
  bool deuces_wild = 9;
  repeated Player player = 10;
}

message GameSettings {
  int32 client_id = 1;
  uint32 action_timeout_ms = 2;
  uint32 end_of_game_timeout_ms = 3;
}
