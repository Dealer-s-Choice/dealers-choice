syntax = "proto3";

message Card {
  int32 face_val = 1;
  int32 suit = 2;
}

message Hand {
  repeated Card card = 1;
}

message Pos {
  int32 x = 1;
  int32 y = 2;
}

message Player {
  string name = 1;
  uint32 id = 2;
  Pos pos = 3;
  Hand hand = 4;
  uint32 chips = 5;
  bool in = 6;
  uint32 total_paid = 7;
}

message GameState {
  uint32 pot = 1;
  uint32 current_bet = 2;
  uint32 dealer_id = 3;
  uint32 turn_id = 4;
  bool at_menu = 5;
  uint32 player_count = 6;
  uint32 total_bets_plus_raises = 7;
  repeated Player player = 8;
}
