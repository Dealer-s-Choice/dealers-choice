syntax = "proto3";

message Card {
  int32 face_val = 1;
  int32 suit = 2;
}

message Hand {
  repeated Card card = 1;
}

message Player {
  string nick = 1;
  int32 id = 2;
  Hand hand = 3;
  int32 coins = 4;
  bool in = 5;
  bool winner = 6;
  bool is_connected = 7;
}

message GameState {
  uint32 pot = 1;
  int32 dealer_id = 2;
  bool at_menu = 3;
  uint32 player_count = 4;
  uint32 raises_remaining = 5;
  bool winner_declared = 6;
  bool deuces_wild = 7;
  repeated Player player = 8;
}

message GameSettings {
  int32 client_id = 1;
  uint32 action_timeout_ms = 2;
  uint32 end_of_game_timeout_ms = 3;
}
