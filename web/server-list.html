<!DOCTYPE html>
<!--
  Dealer's Choice active-server list — a self-contained, framework-free widget.

  It fetches a registry's servers.json and renders it as a table, refreshing
  periodically. The registry (dealers-choice-registry) writes that
  file; serve it with CORS (Access-Control-Allow-Origin) only if the page is on
  a different origin than the JSON (same origin needs no header).

  Point it at a registry with the ?src= query parameter, e.g.
    server-list.html?src=https://registry.example.org/servers.json
  (defaults to ./servers.json next to this page).

  Embed it in any site with an iframe:
    <iframe src="https://your.site/server-list.html?src=https://registry.example.org/servers.json"
            style="width:100%;height:560px;border:0"></iframe>

  No external CSS/JS/fonts. The only companion asset is felt.png (the same
  seamless felt tile the game uses); if it's missing the background just falls
  back to a solid green. Written by Claude (Opus 4.8, an LLM by Anthropic) at
  Andy's direction.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dealer's Choice — active tables</title>
<meta name="description" content="Live list of active Dealer's Choice poker servers.">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#08321e">
<link rel="icon" type="image/svg+xml" href="dealers-choice.svg">
<link rel="alternate" type="application/atom+xml" title="Dealer's Choice releases" href="https://github.com/Dealer-s-Choice/dealers-choice/releases.atom">
<meta property="og:type" content="website">
<meta property="og:title" content="Dealer's Choice — active tables">
<meta property="og:description" content="Live list of active Dealer's Choice poker servers.">
<meta property="og:url" content="https://dealers-choice-foss.dev/">
<style>
  :root {
    --gold:#e9c46a; --gold-dim:#b98f3e; --parch:#f1ece0;
    --muted:#9fb6a6; --red:#ef5a52; --line:rgba(233,196,106,.16);
  }
  * { box-sizing:border-box; }
  html, body { margin:0; }
  body {
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    color:var(--parch); min-height:100vh;
    background:#08321e url("felt.png") repeat;
    padding:clamp(1rem,4vw,2.5rem); display:flex; justify-content:center;
    -webkit-font-smoothing:antialiased;
    -webkit-text-size-adjust:100%; text-size-adjust:100%;  /* no Android font-boosting */
  }
  /* edge vignette over the felt, content rides above it */
  body::after { content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
    background:radial-gradient(135% 100% at 50% -12%, rgba(0,0,0,0) 30%, rgba(2,12,8,.86)); }
  .room { position:relative; z-index:1; width:100%; max-width:880px; }

  .head { display:flex; align-items:center; justify-content:space-between;
          gap:1rem; margin:0 .2rem 1.15rem;
          text-shadow:0 2px 10px rgba(0,0,0,.55); }
  .suits { font-size:.95rem; letter-spacing:.45em; margin:0 0 .4rem; }
  .suits .r { color:var(--red); }
  .suits .b { color:var(--parch); }
  h1 { font-family:Georgia,"Iowan Old Style","Times New Roman",serif;
       font-weight:600; font-size:clamp(1.7rem,5.2vw,2.7rem); line-height:1.02;
       margin:0; color:var(--gold); }
  .tagline { margin:.4rem 0 0; font-size:.7rem; text-transform:uppercase;
             letter-spacing:.34em; color:var(--muted); }
  .home { flex:none; font-size:.8rem; letter-spacing:.04em; text-decoration:none;
          color:var(--gold); background:rgba(8,40,24,.55);
          border:1px solid var(--gold-dim); border-radius:999px;
          padding:.5rem .95rem; white-space:nowrap;
          transition:background .15s,color .15s,border-color .15s; }
  .home:hover, .home:focus-visible { background:var(--gold); color:#0a2c1c;
          border-color:var(--gold); outline:none; }

  .felt { position:relative; border-radius:20px; overflow:hidden;
    /* darken the felt under the data so rows stay crisp */
    background:linear-gradient(180deg, rgba(4,20,12,.5), rgba(3,16,10,.62)), url("felt.png") repeat;
    border:1px solid rgba(0,0,0,.5);
    box-shadow:0 0 0 6px #0a2c1c, 0 0 0 7px rgba(233,196,106,.22),
               0 26px 64px -22px #000;
    padding:.3rem clamp(.35rem,1.6vw,1rem) .5rem; }

  table { border-collapse:collapse; width:100%; }
  thead th { text-align:left; font-size:.67rem; text-transform:uppercase;
    letter-spacing:.2em; color:var(--gold); font-weight:600;
    padding:.95rem .85rem .65rem; border-bottom:1px solid var(--line); }
  tbody td { padding:.8rem .85rem; border-bottom:1px solid var(--line);
    vertical-align:middle; }
  tbody tr:last-child td { border-bottom:0; }
  tbody tr { transition:background .12s; }
  tbody tr:hover td { background:rgba(255,255,255,.05); }

  .name { font-weight:600; font-size:1.03rem; color:#fff; }
  .addr { font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
          font-size:.85rem; color:var(--muted); }
  /* No font-variant-numeric: on some Android system fonts, requesting the
     tabular-figures feature shapes the whole run with a font that renders it
     invisibly — the Players/Uptime values vanished on mobile. */
  .players .max { color:var(--muted); }
  .uptime { color:var(--parch); }

  .state { padding:2.4rem 1rem; text-align:center; }
  .state .big { font-size:1.05rem; color:var(--parch); margin:0 0 .35rem; }
  .state .sub { font-size:.86rem; color:var(--muted); margin:0; }
  .state.err .big { color:#ffb3ae; }

  .foot { display:flex; align-items:center; gap:.5rem; margin:1rem 0 0 .35rem;
    font-size:.76rem; color:var(--muted); letter-spacing:.03em;
    text-shadow:0 1px 6px rgba(0,0,0,.55); }
  .livedot { width:.5rem; height:.5rem; border-radius:50%; background:#7fcf9e; flex:none;
    box-shadow:0 0 0 0 rgba(127,207,158,.6); animation:pulse 2.6s infinite; }

  @keyframes pulse { 70% { box-shadow:0 0 0 .5rem transparent; }
                     100% { box-shadow:0 0 0 0 transparent; } }
  @media (prefers-reduced-motion:reduce) { * { animation:none !important; } }

  @media (max-width:560px) {
    thead { position:absolute; left:-9999px; }
    tbody tr { display:block; padding:.65rem .15rem; border-bottom:1px solid var(--line); }
    tbody tr:last-child { border-bottom:0; }
    /* Stacked "LABEL / value" rows: each cell a block, the data-label as a block
       ::before, the value below it. (Avoid display:flex on the td — overriding
       table-cell to flex with a ::before flex-item renders inconsistently on
       mobile Blink.) See the font-size note below for the Firefox-Android fix. */
    tbody td { display:block; border-bottom:0; padding:.1rem .6rem .45rem; }
    tbody td::before { content:attr(data-label); display:block; margin-bottom:.05rem;
      color:var(--gold); font-size:.6rem; text-transform:uppercase; letter-spacing:.13em; }
    td.name-cell::before { content:none; }
    /* EVERY value gets an explicit font-size on mobile. Firefox Android's font
       inflation (text autosizing) drops un-sized value spans entirely — the text
       isn't laid out at all (it isn't even selectable). The cells that always
       rendered (name, addr) were the ones that happened to have a size; players
       and uptime did not. An explicit size opts each element out of inflation. */
    .name { font-size:1.15rem; }
    .addr { font-size:.85rem; overflow-wrap:anywhere; }  /* let long IPv6 wrap, never clip */
    .players, .uptime { display:block; font-size:.95rem; }
  }
</style>
</head>
<body>
<main class="room">
  <header class="head">
    <div class="brand">
      <div class="suits" aria-hidden="true"><span class="b">&spades;</span> <span class="r">&hearts;</span> <span class="r">&diams;</span> <span class="b">&clubs;</span></div>
      <h1>Dealer's Choice</h1>
      <p class="tagline">Active tables</p>
    </div>
    <a class="home" href="https://dealer-s-choice.github.io/">Home &nearr;</a>
  </header>

  <div class="felt">
    <div id="dc-servers"><div class="state"><p class="big">Dealing…</p></div></div>
  </div>

  <footer class="foot"><span class="livedot" aria-hidden="true"></span><span id="dc-updated">Connecting…</span></footer>
</main>

<script>
(function () {
  var params = new URLSearchParams(location.search);
  var SRC = params.get("src") || "./servers.json";
  var REFRESH_MS = 30000;
  var box = document.getElementById("dc-servers");
  var updated = document.getElementById("dc-updated");

  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  // start_time is the server's unix boot time (0 = unknown). Compute uptime
  // against the viewer's clock each render, so it stays current between fetches.
  function uptime(start) {
    if (!start) return "—";
    var s = Math.floor(Date.now() / 1000) - start;
    if (s < 0) return "—";
    if (s < 60) return "just now";
    var m = Math.floor(s / 60), h = Math.floor(m / 60), d = Math.floor(h / 24);
    if (d >= 1) return d + "d " + (h % 24) + "h";
    if (h >= 1) return h + "h " + (m % 60) + "m";
    return m + "m";
  }

  function render(servers) {
    if (!servers || !servers.length) {
      box.innerHTML = '<div class="state"><p class="big">No tables are running right now.</p>' +
                      '<p class="sub">Start a server and it shows up here.</p></div>';
      return;
    }
    var rows = servers.map(function (s) {
      var addr = esc(s.ip) + ":" + esc(s.port);
      var cur = s.players != null ? s.players : "?";
      var max = s.max != null ? s.max : "?";
      return '<tr>' +
        '<td class="name-cell" data-label="Table"><span class="name">' + esc(s.name || "Unnamed table") + '</span></td>' +
        '<td data-label="Address"><span class="addr">' + addr + '</span></td>' +
        '<td data-label="Players"><span class="players">' + esc(cur) + ' <span class="max">/ ' + esc(max) + '</span></span></td>' +
        '<td data-label="Uptime"><span class="uptime">' + esc(uptime(s.start_time)) + '</span></td>' +
      '</tr>';
    }).join("");
    box.innerHTML =
      '<table><thead><tr><th>Table</th><th>Address</th><th>Players</th><th>Uptime</th>' +
      '</tr></thead><tbody>' + rows + '</tbody></table>';
  }

  function load() {
    fetch(SRC, { cache: "no-store" })
      .then(function (r) {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(function (data) {
        render(Array.isArray(data) ? data : []);
        updated.textContent = "Live · updated " + new Date().toLocaleTimeString();
      })
      .catch(function (e) {
        box.innerHTML = '<div class="state err"><p class="big">Couldn’t load the table list.</p>' +
                        '<p class="sub">' + esc(e.message) + '</p></div>';
        updated.textContent = "Reconnecting…";
      });
  }

  load();
  setInterval(load, REFRESH_MS);
})();
</script>
</body>
</html>
