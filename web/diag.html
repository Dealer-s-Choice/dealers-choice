<!DOCTYPE html>
<!--
  TEMPORARY diagnostic for the "Players/Uptime values invisible / not laid out on
  Android" bug (Firefox + DuckDuckGo, but fine in Chrome and on desktop).

  v2: every value variant sets BOTH its color and its font-family explicitly, so
  nothing inherits the report container's gold/monospace (the v1 leak that made
  the "system-ui" variants accidentally render as monospace). Now the system-ui
  cases actually test system-ui.

  Each variant renders the same "2 / 5" and prints the browser's own computed
  color / size / display / visibility / opacity / laid-out box (WxH) / family.
  The report text is gold monospace (proven to render on the affected phones) so
  the explanation is readable even when a value is invisible or unlaid.

  Load on the phone in EACH failing browser and screenshot every card:
    https://dealers-choice-foss.dev/diag.html
  Delete this file once the bug is fixed.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DC widget render diagnostic v2</title>
<style>
  :root { --gold:#e9c46a; --parch:#f1ece0; --muted:#9fb6a6; }
  * { box-sizing:border-box; }
  html, body { margin:0; }
  body {
    color:var(--parch); min-height:100vh;
    background:#08321e url("felt.png") repeat;
    padding:1rem;
    -webkit-text-size-adjust:100%; text-size-adjust:100%;
  }
  /* Report chrome: gold monospace, known to render on the affected phones. */
  .report, h1, .desc, .rpt {
    font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace; color:var(--gold); }
  .report { font-size:13px; line-height:1.5; }
  h1 { font-size:15px; margin:0 0 .5rem; }
  .case { border:1px solid rgba(233,196,106,.3); border-radius:8px;
    padding:.5rem .6rem; margin:0 0 .7rem; }
  .desc { display:block; font-size:11px; text-transform:uppercase;
    letter-spacing:.1em; margin-bottom:.25rem; }
  .rpt { display:block; font-size:11px; margin-top:.3rem; opacity:.85;
    overflow-wrap:anywhere; }

  /* Each value variant pins BOTH color and font-family so there is no leak.
     SANS = system-ui keyword (the suspect). EXPL = explicit named sans. MONO. */
  .val { font-size:22px; }
  .sys   { font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; }
  .expl  { font-family:Roboto,"Helvetica Neue",Arial,sans-serif; }
  .mono  { font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace; }
  .c-parch { color:var(--parch); }
  .c-white { color:#fff; }
  .c-none  { }                    /* no color set: inherits body's parch */
  .blk     { display:block; }
</style>
</head>
<body>
<h1>DC render diagnostic v2 &mdash; screenshot every card</h1>
<div id="cases" class="report"></div>

<script>
(function () {
  var box = document.getElementById("cases");
  var VAL = '2 / 5';   // plain digit run, no nested span (keep it simple/faithful)

  // [description, class list applied to the value span]
  var variants = [
    ["A: REAL CASE - inherited color + system-ui",  "val sys c-none"],
    ["B: parch + system-ui",                         "val sys c-parch"],
    ["C: white + system-ui",                         "val sys c-white"],
    ["D: parch + explicit sans (Roboto/Arial)",      "val expl c-parch"],
    ["E: white + explicit sans",                     "val expl c-white"],
    ["F: parch + monospace",                         "val mono c-parch"],
    ["G: system-ui + display:block (committed-fix shape)", "val sys c-parch blk"],
    ["H: system-ui + display:block + white",         "val sys c-white blk"],
  ];

  variants.forEach(function (def, i) {
    var desc = def[0], cls = def[1];
    var card = document.createElement("div");
    card.className = "case";
    card.innerHTML =
      '<span class="desc">' + desc + '</span>' +
      '<span class="' + cls + '" id="val' + i + '">' + VAL + '</span>' +
      '<span class="rpt" id="rpt' + i + '"></span>';
    box.appendChild(card);

    var el = card.querySelector("#val" + i);
    var cs = getComputedStyle(el);
    card.querySelector("#rpt" + i).textContent =
      "color=" + cs.color +
      " | size=" + cs.fontSize +
      " | display=" + cs.display +
      " | vis=" + cs.visibility +
      " | op=" + cs.opacity +
      " | box=" + el.offsetWidth + "x" + el.offsetHeight +
      " | family=" + cs.fontFamily;
  });

  var env = document.createElement("div");
  env.className = "case";
  env.innerHTML = '<span class="desc">ENV</span><span class="rpt">' +
    "ua=" + navigator.userAgent + "<br>dpr=" + window.devicePixelRatio +
    " | innerWidth=" + window.innerWidth + "</span>";
  box.appendChild(env);
})();
</script>
</body>
</html>
