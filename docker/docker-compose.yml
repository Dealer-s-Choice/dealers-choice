# Container stdout/stderr log rotation via Docker's json-file driver (NOT baked
# into DC): caps each container's logs at max-file * max-size. Referenced by
# every service through the *dc_logging anchor.
x-logging: &dc_logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  dealers-choice-server:
    image: ${DC_IMAGE:-ghcr.io/dealer-s-choice/dealers_choice:latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile
    # Logs go to port-named files under the output mount, so two servers on
    # different DC_PORT values don't clobber each other's logs. $$DC_PORT is
    # expanded by the container's shell (not Compose) from the DC_PORT env below.
    # --port makes the server LISTEN on DC_PORT (not the hardcoded default), so
    # the port it advertises to the registry / LAN discovery matches the port it
    # is actually reachable on. Without it, a remapped publish (DC_PORT:22777)
    # would make the server announce 22777 while only DC_PORT is reachable.
    command: sh -c 'exec dealers-choice-server --port "$$DC_PORT" --log-hands "/dc_output/hands-$$DC_PORT.txt" --log-game-results "/dc_output/results-$$DC_PORT.md" $$DC_EXTRA_ARGS'
    environment:
      # DC_PORT is the published (host) port; it names the log files above and is
      # not otherwise read by the server. DC_CONFIG_DIR/DC_OUTPUT_DIR are NOT read
      # by the server; they only feed the volume bind sources below. Add anything
      # else (e.g. --conf /dc_config/server.conf, --verbose, --name) via
      # DC_EXTRA_ARGS.
      - DC_PORT=${DC_PORT:-22777}
      - DC_EXTRA_ARGS=${DC_EXTRA_ARGS:-}
      - DC_PASSWORD=${DC_PASSWORD}
    # Leaving DC_*_DIR unset (the default) uses a managed named volume, owned by
    # the image's non-root user, so it works with no host-uid setup. Set
    # DC_CONFIG_DIR / DC_OUTPUT_DIR to a host PATH to bind-mount instead (e.g. to
    # read logs on the host) — then match DC_UID to that path's owner.
    volumes:
      - "${DC_CONFIG_DIR:-dc_config}:/dc_config"
      - "${DC_OUTPUT_DIR:-dc_output}:/dc_output"
    # Network mode. Default "bridge" (with the published ports below). Set
    # DC_NET_MODE=host in .env on a host whose PUBLIC IP is on its own NIC (a
    # plain VPS, e.g. BitFolk): on bridge there, the server's own announce to a
    # co-located registry hairpins through docker-proxy and the registry records
    # the docker gateway (172.x) instead of the public IP. Host mode removes the
    # bridge so the announce carries the real public IP. NOT needed where the
    # cloud NATs the public IP externally (e.g. Oracle/OCI) -- bridge works there
    # and keeps container netns isolation, so leave DC_NET_MODE unset on those.
    # Under host mode the ports: list below is ignored (a harmless compose warning).
    network_mode: "${DC_NET_MODE:-bridge}"
    # Publish the same port inside and out so the advertised port (= listen port,
    # set by --port above) is the one clients actually reach.
    ports:
      - "${DC_PORT:-22777}:${DC_PORT:-22777}"
    # Long-lived daemon: restart on crash and after reboot, but honor a manual
    # `compose stop`. (For local dev you may prefer `no`.)
    restart: unless-stopped
    # Opt-in, like the bot and registry, so a bare `up` (or bringing up the
    # registry) never auto-starts a server. Start it explicitly:
    #   docker compose --profile server up -d
    # Run unprivileged with no extra capabilities, so a compromised parser is an
    # unprivileged container account, not container-root. DC_UID/DC_GID default to
    # 1000; set them to match the host owner of the mounted dirs if different.
    user: "${DC_UID:-1000}:${DC_GID:-1000}"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging: *dc_logging
    profiles:
      - server

  # Optional bot(s) — not started by default.
  #   docker compose --profile bot up
  #   docker compose --profile bot up --scale dealers-choice-bot=3
  # Connects to DC_BOT_HOST:DC_BOT_PORT (default: the server service on 22777).
  # No dependency on the server service: start a server yourself (--profile
  # server) or point DC_BOT_HOST/DC_BOT_PORT at an external one. If no server is
  # reachable the bot just errors out and (per restart: on-failure) retries.
  dealers-choice-bot:
    image: ${DC_IMAGE:-ghcr.io/dealer-s-choice/dealers_choice:latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: sh -c 'exec dealers-choice-bot --host "$$DC_BOT_HOST" --port "$$DC_BOT_PORT" $$DC_BOT_ARGS'
    environment:
      - DC_BOT_HOST=${DC_BOT_HOST:-dealers-choice-server}
      # Defaults to DC_PORT, so reusing a per-instance env file (e.g. one with
      # DC_PORT=22778) points the bot at that instance's server with no extra
      # var. Set DC_BOT_PORT explicitly to target an external/off-instance server.
      - DC_BOT_PORT=${DC_BOT_PORT:-${DC_PORT:-22777}}
      - DC_BOT_ARGS=${DC_BOT_ARGS:-}
      - DC_PASSWORD=${DC_PASSWORD}
    user: "${DC_UID:-1000}:${DC_GID:-1000}"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging: *dc_logging
    profiles:
      - bot
    # Restart only if the bot crashes — not when it exits cleanly (done/quit).
    restart: on-failure

  # Optional registry (directory) — not started by default.
  #   docker compose --profile registry up
  # EXPERIMENTAL: only for adventurous operators running a *public* server
  # directory. The registry is new and lightly tested; the protocol is not
  # final. Game servers announce themselves to it and clients browse the list.
  # It does NOT store browsing-client IP addresses.
  # The server list is written to /dc_registry/servers.json (mounted from
  # DC_REGISTRY_DIR) so a website can serve it. Add --verbose via
  # DC_REGISTRY_ARGS to log announces / list requests.
  dealers-choice-registry:
    image: ${DC_IMAGE:-ghcr.io/dealer-s-choice/dealers_choice:latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: sh -c 'exec dealers-choice-registry --json /dc_registry/servers.json $$DC_REGISTRY_ARGS'
    environment:
      # DC_REGISTRY_DIR only feeds the volume bind source below; the registry
      # is pointed at the mount via the fixed --json path in the command above.
      - DC_REGISTRY_ARGS=${DC_REGISTRY_ARGS:-}
    volumes:
      # Default (unset) → a managed named volume owned by the non-root user, so it
      # works with no host-uid setup (and an unset var can't break the bind spec).
      # Set DC_REGISTRY_DIR to a host path to serve servers.json from there (e.g.
      # a website) — then match DC_UID to that path's owner.
      - "${DC_REGISTRY_DIR:-dc_registry}:/dc_registry"
    # See dealers-choice-server for DC_NET_MODE; keep it the same as the server on
    # the same host (host mode on a direct-IP VPS, bridge where the cloud NATs).
    network_mode: "${DC_NET_MODE:-bridge}"
    ports:
      - "${DC_REGISTRY_PORT:-22070}:22070"
    user: "${DC_UID:-1000}:${DC_GID:-1000}"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging: *dc_logging
    profiles:
      - registry
    # Long-lived daemon, same policy as the server.
    restart: unless-stopped

# Named volumes used when DC_*_DIR is left unset (the default). Each Compose
# project gets its own, so separate server instances don't share storage. The
# image owns these mountpoints as the non-root user, so fresh volumes are
# writable without any host-uid setup.
volumes:
  dc_config:
  dc_output:
  dc_registry:
