name: Linux
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

on:
  push:
    branches: [ trunk ]
    paths:
    - '**'
    - '!**.yml'
    - '!**.md'
    - '**/linux.yml'

  pull_request:
    branches: [ trunk ]
    paths:
    - '**'
    - '!**.yml'
    - '!**.md'
    - '**/linux.yml'

jobs:
  Ubuntu:
    strategy:
      matrix:
        os:
          - ubuntu-24.04-arm
          - ubuntu-24.04
        cc:
          - gcc
          - clang
        include:
          - os: ubuntu-22.04
            cc: gcc
            dist_test: true

    runs-on: ${{ matrix.os }}
    env:
      CC: ${{ matrix.cc }}
    steps:
    - uses: actions/checkout@v4
    - name: Install Dependencies
      run: |
        sudo apt update && sudo apt upgrade -y
        sudo apt-get install --no-install-recommends -y \
          meson \
          libprotobuf-c-dev \
          libsdl2-dev \
          libsdl2-net-dev \
          libsdl2-ttf-dev

    - name: Meson setup
      run: CFLAGS="-Werror" meson setup _build

    - name: Build
      run: meson compile -C _build

    - name: Test
      run: meson test -v -C _build

    - name: Dist test
      if: ${{ matrix.dist_test == 'true' || false }}
      run: meson dist -C _build

    - name: Install test
      run: meson install --destdir=install_test -C _build
