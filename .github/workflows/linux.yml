name: Linux
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'version number'
        required: false
        type: string
  push:
    tags:
      - 'v*'
    branches: [ trunk ]
    paths: &shared_paths
      - '**'
      - '!**.yml'
      - '!**.md'
      - '!docker/Dockerfile-build-env_**'
      - '**/linux.yml'

  pull_request:
    branches: [ trunk ]
    paths: *shared_paths

env:
  CFLAGS: '-Werror'

jobs:
  gate:
    if: github.event_name != 'workflow_dispatch' && !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    env:
      CC: gcc
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Install Dependencies
      run: scripts/install_ubuntu_deps.sh
    - name: Meson setup
      run: meson setup _build
    - name: Build
      run: meson compile -C _build
    - name: Test
      run: meson test --no-stdsplit -v -C _build
    # If the protobuf schema changed, regenerate the .pb-c.* fresh (uncommitted)
    # and build against them. Building (not diffing) tolerates protoc-gen-c
    # version differences and only fails on a real schema/code mismatch.
    - name: Protobuf schema/code sync
      if: github.event_name == 'pull_request'
      run: |
        base="${{ github.event.pull_request.base.sha }}"
        if git diff --name-only "$base"...HEAD | grep -q '^src/dc_protocol.proto$'; then
          echo "dc_protocol.proto changed -- regenerating and building against fresh output"
          sudo apt-get install --no-install-recommends -y protobuf-compiler protobuf-c-compiler
          meson setup _build_proto -Dgen_protobuf=true
          meson compile -C _build_proto gen-proto
          meson compile -C _build_proto
        else
          echo "dc_protocol.proto unchanged -- skipping proto regen check"
        fi

  sanitizers:
    if: github.event_name != 'workflow_dispatch' && !startsWith(github.ref, 'refs/tags/')
    needs: gate
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: asan
            sanitize: address,undefined
          - name: tsan
            sanitize: thread
    steps:
    - uses: actions/checkout@v6
    - name: Install Dependencies
      run: scripts/install_ubuntu_deps.sh
    - name: Meson setup
      run: CC=clang CFLAGS="${{ env.CFLAGS }} -fno-sanitize-recover=all" meson setup _build -Db_sanitize=${{ matrix.sanitize }} -Db_lundef=false
    - name: Build
      run: meson compile -C _build
    - name: Test
      run: meson test --setup=One_pass --no-stdsplit -v -C _build

  Ubuntu:
    if: github.event_name != 'workflow_dispatch' && !startsWith(github.ref, 'refs/tags/')
    needs: sanitizers
    strategy:
      matrix:
        name: [default]
        os:
          - ubuntu-24.04
        cc:
          - gcc
          - clang
        exclude:
          - os: ubuntu-24.04
            cc: gcc
        include:
          - name: dist-test
            os: ubuntu-22.04
            cc: gcc
          - name: Arch Linux
            os: ubuntu-latest
            cc: gcc
            container: ghcr.io/dealer-s-choice/build_env:build-env-arch

    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    env:
      CC: ${{ matrix.cc }}
    steps:
    - uses: actions/checkout@v6
    - name: Install Dependencies
      if: ${{ matrix.container == null }}
      run: scripts/install_ubuntu_deps.sh

    - name: Meson setup
      run: meson setup _build

    - name: Build
      run: meson compile -C _build

    - name: Test
      run: meson test --no-stdsplit -v -C _build

    - name: Dist test
      if: ${{ contains(matrix.name, 'dist-test') }}
      run: meson dist --include-subprojects -C _build

    - name: Install test
      run: meson install --destdir=install_test -C _build

  build-deb:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.runs-on }}
    permissions:
      contents: write
    env:
      VERSION: ${{ inputs.version }}
    strategy:
      matrix:
        include:
          - platform: amd64
            runs-on: ubuntu-latest
          - platform: arm64
            runs-on: ubuntu-24.04-arm

    steps:
    - uses: actions/checkout@v6

    - name: Set version
      run: |
        if [[ -z "${VERSION}" ]]; then
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="snapshot"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
        fi

    - name: Update changelog version
      run: |
        sed -i "1s/([^)]*)/($VERSION)/" packaging/debian/changelog

    - name: Copy debian directory
      run: cp -a packaging/debian .

    - uses: andy5995/gh-action-build-deb@v1
      with:
        args: |
          --no-sign
          --compression=xz
        platform: ${{ matrix.platform }}
        codename: trixie

    - name: Checksum
      run: |
        DEB_FILENAME=$(basename $(find output/ -name "dealers-choice_*.deb" | head -1))
        echo "DEB_FILENAME=$DEB_FILENAME" >> "$GITHUB_ENV"
        cd output
        sha256sum "$DEB_FILENAME" > "../${DEB_FILENAME}.sha256sum"

    - name: Release (tagged)
      if: startsWith(github.ref, 'refs/tags/') || inputs.version != ''
      uses: ncipollo/release-action@v1
      with:
        artifacts: "output/${{ env.DEB_FILENAME }},${{ env.DEB_FILENAME }}.sha256sum"
        tag: ${{ inputs.version != '' && format('v{0}', env.VERSION) || '' }}
        allowUpdates: true
        prerelease: false
        omitBodyDuringUpdate: true
        omitNameDuringUpdate: true
        token: ${{ secrets.GITHUB_TOKEN }}
