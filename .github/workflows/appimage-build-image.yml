name: AppImage Build Image CI

# Builds the build-environment image used by appimage.yml
# (packaging/appimage/build-appimage.sh). Each arch builds natively and is
# pushed by digest; a final job combines them into one multi-arch manifest so
# the registry serves the right arch per tag (no arch in the tag name).

on:
  workflow_dispatch:
  push:
    branches: [ "trunk" ]
    paths:
      - '.github/workflows/appimage-build-image.yml'
      - 'docker/Dockerfile-appimage'
  # Periodic rebuild so the baked-in Arch packages don't go stale.
  schedule:
    - cron: '30 2 9,23 * *'

permissions:
  contents: read
  packages: write

env:
  REGISTRY_IMAGE: ghcr.io/dealer-s-choice/appimage-build-env

jobs:
  build:
    name: build-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
            platform: linux/amd64
            base: archlinux:latest
          # Official Arch is x86_64-only, so arm64 builds from the community
          # Arch Linux ARM image (digest-pinned, matching appimage.yml).
          - runner: ubuntu-24.04-arm
            arch: arm64
            platform: linux/arm64
            base: lopsided/archlinux@sha256:bb1e4b4a564126c7d91c63813a3d3afe34334ec5dd15285ed8b574c88e23fbde

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile-appimage
          platforms: ${{ matrix.platform }}
          build-args: |
            BASE=${{ matrix.base }}
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: merge-manifest
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digest-*
          merge-multiple: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create and push manifest list
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create -t "${REGISTRY_IMAGE}:latest" \
            $(printf "${REGISTRY_IMAGE}@sha256:%s " *)

      - name: Inspect
        run: docker buildx imagetools inspect "${REGISTRY_IMAGE}:latest"
