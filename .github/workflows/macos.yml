name: MacOS
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

on:
  push:
    branches: [ trunk ]
    paths: &shared_paths
    - '**'
    - '!**.yml'
    - '!**.md'
    - '**/macos.yml'

  pull_request:
    branches: [ trunk ]
    paths: *shared_paths

jobs:
  MacOS:
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-15
          - macos-14
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v5
    - name: Install Dependencies
      run: |
        brew update
        brew install \
          gettext \
          meson \
          protobuf-c \
          sdl2 \
          sdl2_image \
          sdl2_net \
          sdl2_ttf

    - name: Meson setup
      run: |
        GETTEXT_PREFIX=$(brew --prefix gettext)
        echo $GETTEXT_PREFIX
        # PKG_CONFIG_PATH="$GETTEXT_PREFIX/lib/pkgconfig:$PKG_CONFIG_PATH"
        CFLAGS="-Werror" meson setup _build

    - name: Build
      run: meson compile -v -C _build

    - name: Test
      run: meson test -v -C _build
