name: MSYS2
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'version number'
        required: false
        type: string
  push:
    tags:
      - 'v*'
    branches: [ trunk ]
    paths: &shared_paths
    - '**'
    - '!**.yml'
    - '!**.md'
    - '!docker/Dockerfile-build-env_**'
    - '**/msys2.yml'

  pull_request:
    branches: [ trunk ]
    paths: *shared_paths

jobs:
  MSYS2:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ inputs.version }}
      SDL_IMAGE_TAG: release-2.8.12
    strategy:
      matrix:
        platform: ['UCRT64', 'CLANG64']
    steps:
    - uses: actions/checkout@v7
    - uses: msys2/setup-msys2@v2
      with:
        msystem: ${{matrix.platform}}
        install: >-
          git
        pacboy: >-
          cc:p
          cmake:p
          gettext:p
          libsodium:p
          meson:p
          ninja:p
          pkgconf:p
          protobuf-c:p
          SDL2:p
          SDL2_ttf:p
        update: true
        cache: true

    # DC only decodes PNG (via SDL_image's built-in stb backend) and SVG (via the
    # bundled nanosvg) — see src/ui/graphics.c and src/widgets/card_text_atlas.c.
    # The prebuilt SDL2_image package links libavif, libjxl, libtiff, libwebp and
    # the whole AV1 codec stack (libaom/libdav1d/librav1e/libSvtAv1Enc): ~29M of
    # DLLs that collect-dlls.sh then bundles into the installer and DC never uses.
    # Build a slim SDL2_image with only PNG+SVG so those imports vanish and ldd
    # stops pulling them. With BACKEND_STB=ON, PNG needs no libpng/zlib either.
    # The build dir is cached on the tag, so a cache hit skips clone+configure+
    # build and only re-runs the cheap install. Bump SDL_IMAGE_TAG to invalidate.
    - name: Cache slim SDL2_image build
      id: sdl_image_cache
      uses: actions/cache@v6
      with:
        path: _sdl_image_build
        key: ${{ runner.os }}-${{ matrix.platform }}-sdl_image-${{ env.SDL_IMAGE_TAG }}

    - name: Build slim SDL2_image (PNG + SVG only)
      if: steps.sdl_image_cache.outputs.cache-hit != 'true'
      shell: msys2 {0}
      run: |
        git clone --depth 1 --branch "$SDL_IMAGE_TAG" \
          https://github.com/libsdl-org/SDL_image.git _sdl_image_src
        cmake -S _sdl_image_src -B _sdl_image_build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX="$MINGW_PREFIX" \
          -DBUILD_SHARED_LIBS=ON \
          -DSDL2IMAGE_SAMPLES=OFF \
          -DSDL2IMAGE_TESTS=OFF \
          -DSDL2IMAGE_BACKEND_STB=ON \
          -DSDL2IMAGE_PNG=ON \
          -DSDL2IMAGE_SVG=ON \
          -DSDL2IMAGE_AVIF=OFF \
          -DSDL2IMAGE_JXL=OFF \
          -DSDL2IMAGE_JPG=OFF \
          -DSDL2IMAGE_TIF=OFF \
          -DSDL2IMAGE_WEBP=OFF
        cmake --build _sdl_image_build

    # Always run: on a cache hit the build dir is restored but not yet installed
    # into $MINGW_PREFIX where meson's dependency('SDL2_image') looks for it.
    - name: Install slim SDL2_image
      shell: msys2 {0}
      run: |
        cmake --install _sdl_image_build

    - name: Meson setup
      shell: msys2 {0}
      run: |
        CFLAGS="-Werror" meson setup _build -Db_sanitize=none

    - name: Build
      shell: msys2 {0}
      run: |
        meson compile -C _build

    - name: Test
      shell: msys2 {0}
      continue-on-error: false
      run: |
        PYTHONUTF8=1 meson test --no-stdsplit -v -C _build

    - name: Stage installer files
      if: matrix.platform == 'UCRT64'
      shell: msys2 {0}
      run: |
        mkdir -p _staging/data
        cp _build/dealers-choice.exe _build/dealers-choice-bot.exe _staging/
        # Ship the whole data/ tree (mirrors meson's install_subdir('data')) so a
        # new asset or config file can never be left out of the package again
        # (this is what caused the missing common.conf/layout.conf).
        cp -r data/. _staging/data/
        bash packaging/windows/collect-dlls.sh _staging/dealers-choice.exe _staging/

    - name: Set version
      if: matrix.platform == 'UCRT64'
      shell: bash
      run: |
        if [[ -z "${VERSION}" ]]; then
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="snapshot"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
        fi
        case "${{ matrix.platform }}" in
          CLANGARM64) ARCH="aarch64" ;;
          *)           ARCH="x86_64"  ;;
        esac
        echo "ARCH=${ARCH}" >> "$GITHUB_ENV"

    - name: Build installer
      if: matrix.platform == 'UCRT64'
      shell: pwsh
      run: |
        iscc /DVERSION=$env:VERSION /DARCH=$env:ARCH packaging\windows\dealers-choice.iss
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

    - name: Checksum
      if: matrix.platform == 'UCRT64'
      shell: pwsh
      run: |
        $file = "dealers-choice-$env:VERSION-windows-$env:ARCH-setup.exe"
        $hash = (Get-FileHash $file -Algorithm SHA256).Hash.ToLower()
        "$hash  $file" | Out-File -Encoding ascii "$file.sha256sum"

    - name: Upload artifact
      if: matrix.platform == 'UCRT64' && github.ref != 'refs/heads/trunk'
      uses: actions/upload-artifact@v7
      with:
        name: dealers-choice-windows-installer
        path: dealers-choice-${{ env.VERSION }}-windows-${{ env.ARCH }}-setup.exe*
        if-no-files-found: error

    - name: Prerelease (trunk)
      if: matrix.platform == 'UCRT64' && github.ref == 'refs/heads/trunk'
      uses: ncipollo/release-action@v1
      with:
        artifacts: "dealers-choice-${{ env.VERSION }}-windows-${{ env.ARCH }}-setup.exe*"
        body: "Dealer's Choice Snapshot Release"
        allowUpdates: true
        prerelease: true
        removeArtifacts: false
        replacesArtifacts: true
        omitBodyDuringUpdate: true
        omitNameDuringUpdate: true
        tag: snapshot
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Release (tagged)
      if: matrix.platform == 'UCRT64' && (startsWith(github.ref, 'refs/tags/') || inputs.version != '')
      uses: ncipollo/release-action@v1
      with:
        artifacts: "dealers-choice-${{ env.VERSION }}-windows-${{ env.ARCH }}-setup.exe*"
        tag: ${{ inputs.version != '' && format('v{0}', env.VERSION) || '' }}
        allowUpdates: true
        prerelease: false
        omitBodyDuringUpdate: true
        omitNameDuringUpdate: true
        token: ${{ secrets.GITHUB_TOKEN }}
