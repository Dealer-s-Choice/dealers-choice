name: Proto check

# Runs only when the protobuf schema or its generated output changes.
# Regenerates the .pb-c.* fresh (uncommitted) and builds against them: if
# netpoker.proto and the C code that uses it are out of sync, the build fails.
#
# Building (not diffing the generated files) is deliberate: protoc-gen-c bakes a
# compiler-version macro into its output, so a byte-diff would flag harmless
# version differences. A build tolerates those — different protoc-gen-c versions
# emit functionally-equivalent code that all compiles — and only fails on a real
# schema/code mismatch.

on:
  pull_request:
    branches: [ trunk ]
    paths:
      - 'src/netpoker.proto'
      - 'src/protobuf/**'
      - '**/proto-check.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  regen-build:
    runs-on: ubuntu-24.04
    env:
      CC: gcc
    steps:
    - uses: actions/checkout@v6
    - name: Install Dependencies
      run: scripts/install_ubuntu_deps.sh
    - name: Install protobuf compilers
      run: sudo apt-get install --no-install-recommends -y protobuf-compiler protobuf-c-compiler
    - name: Meson setup
      run: meson setup _build -Dgen_protobuf=true
    - name: Regenerate protobuf from netpoker.proto (uncommitted)
      run: meson compile -C _build gen-proto
    - name: Build against the freshly-generated protobuf
      run: meson compile -C _build
