name: Build AppImage
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'version number'
        required: false
        type: string
  push:
    tags:
      - 'v*'
    branches: trunk
    paths: &shared_paths
    - '**'
    - '!**.md'
    - '!**.yml'
    - '!docker/Dockerfile-build-env_**'
    - 'packaging/appimage/**'
    - '**/appimage.yml'

  pull_request:
    branches: trunk
    paths: *shared_paths

jobs:
  build-appimage:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    # Prebuilt Arch build-env image with the deps and the DisableSandbox pacman
    # tweak baked in (docker/Dockerfile-appimage, appimage-build-image.yml). It
    # is a multi-arch manifest, so each runner pulls its matching architecture.
    container:
      image: ghcr.io/dealer-s-choice/appimage-build-env:latest
    env:
      VERSION: ${{ inputs.version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
          - runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set version
        run: |
          if [[ -z "${VERSION}" ]]; then
            if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
              TAG_NAME=${GITHUB_REF#refs/tags/}
              VERSION=${TAG_NAME}
            else
              VERSION=snapshot
            fi
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build AppImage
        run: packaging/appimage/build-appimage.sh

      - name: Create sha256sum
        run: |
          ARCH=$(uname -m)
          echo "ARCH=${ARCH}" >> $GITHUB_ENV
          cd out
          file=$(ls *.AppImage)
          sha256sum "$file" > "$file.sha256sum";

      - name: Artifact Filename
        run: echo "ARTIFACT_NAME=dealers-choice-appImage-${ARCH//\//-}" >> $GITHUB_ENV

      - if: ${{ github.ref != 'refs/heads/trunk' }}
        name: Upload AppImage
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ./out/*AppImage*
          if-no-files-found: error

      - name: Release (Tagged)
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          artifacts: "./out/*AppImage*"
          allowUpdates: true
          prerelease: false
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - if: ${{ github.ref == 'refs/heads/trunk' }}
        name: 'Prerelease'
        uses: ncipollo/release-action@v1
        with:
          artifacts: "./out/*AppImage*"
          body: "Dealer's Choice Snapshot Release"
          allowUpdates: true
          prerelease: true
          removeArtifacts: false
          replacesArtifacts: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          tag: snapshot
