name: Build AppImage
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'version number'
        required: false
        type: string
  push:
    tags:
      - 'v*'
    branches: trunk
    paths: &shared_paths
    - '**'
    - '!**.md'
    - '!**.yml'
    - '!docker/Dockerfile-build-env_**'
    - 'packaging/appimage/**'
    - '**/appimage.yml'

  pull_request:
    branches: trunk
    paths: *shared_paths

jobs:
  build-appimage:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    # Official Arch is x86_64-only, so the arm64 leg uses the community
    # Arch Linux ARM image (digest-pinned).
    container:
      image: ${{ matrix.image }}
    env:
      VERSION: ${{ inputs.version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            image: archlinux:latest
          - runner: ubuntu-24.04-arm
            image: lopsided/archlinux@sha256:bb1e4b4a564126c7d91c63813a3d3afe34334ec5dd15285ed8b574c88e23fbde

    steps:
      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm \
            base-devel \
            git \
            meson \
            ninja \
            gettext \
            protobuf-c \
            sdl2 \
            sdl2_image \
            sdl2_ttf \
            libsodium \
            patchelf \
            wget \
            xorg-server-xvfb \
            zsync

      - name: Checkout
        uses: actions/checkout@v7

      - name: Set version
        run: |
          if [[ -z "${VERSION}" ]]; then
            if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
              TAG_NAME=${GITHUB_REF#refs/tags/}
              VERSION=${TAG_NAME}
            else
              VERSION=snapshot
            fi
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build AppImage
        run: packaging/appimage/build-appimage.sh

      - name: Create sha256sum
        run: |
          ARCH=$(uname -m)
          echo "ARCH=${ARCH}" >> $GITHUB_ENV
          cd out
          file=$(ls *.AppImage)
          sha256sum "$file" > "$file.sha256sum";

      - name: Artifact Filename
        run: echo "ARTIFACT_NAME=dealers-choice-appImage-${ARCH//\//-}" >> $GITHUB_ENV

      - if: ${{ github.ref != 'refs/heads/trunk' }}
        name: Upload AppImage
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ./out/*AppImage*
          if-no-files-found: error

      - name: Release (Tagged)
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          artifacts: "./out/*AppImage*"
          allowUpdates: true
          prerelease: false
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - if: ${{ github.ref == 'refs/heads/trunk' }}
        name: 'Prerelease'
        uses: ncipollo/release-action@v1
        with:
          artifacts: "./out/*AppImage*"
          body: "Dealer's Choice Snapshot Release"
          allowUpdates: true
          prerelease: true
          removeArtifacts: false
          replacesArtifacts: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          tag: snapshot
