name: Docker Build Environment Image CI

on:
  workflow_dispatch:
  push:
    branches: [ "trunk" ]
    paths:
      - '.github/workflows/docker-build-env.yml'
      - 'docker/Dockerfile-build-env_**'
  schedule:
    - cron: '30 2 7,21 * *'

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: build-env_${{ matrix.tag }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest]
        tag: [arch]
    runs-on: ${{ matrix.os }}
    env:
      REGISTRY_IMAGE: ghcr.io/dealer-s-choice/build_env
    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      -
        name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile-build-env_${{ matrix.tag }}
          push: true
          tags: ${{ env.REGISTRY_IMAGE }}:build-env-${{ matrix.tag }}
          cache-from: type=registry,ref=${{ env.REGISTRY_IMAGE }}:build-env-${{ matrix.tag }}-buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY_IMAGE }}:build-env-${{ matrix.tag }}-buildcache,mode=max

