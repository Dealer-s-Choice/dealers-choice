name: dealers-choice docker image
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'version number'
        required: false
        type: string
  push:
    tags:
      - 'v*'
    branches: trunk
    paths:
    - '**'
    - '!**.md'
    - '!**.yml'
    - '**/docker.yml'

env:
  GHCR_REGISTRY_IMAGE: ghcr.io/dealer-s-choice/dealers_choice

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.codename }}-${{ matrix.os }}-image
    strategy:
      matrix:
        os:
          - ubuntu-24.04-arm
          - ubuntu-24.04

      fail-fast: true
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Prepare
        run: |
          platform=$(uname -m)
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Set version
        id: get_version
        run: |
          if [[ -z "${VERSION}" ]]; then
            if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
              TAG_NAME=${GITHUB_REF#refs/tags/}
              VERSION=${TAG_NAME}
            else
              VERSION=latest
            fi
            echo "VERSION=$VERSION" >> $GITHUB_ENV
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        uses: actions/checkout@v6
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_REGISTRY_IMAGE }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,"name=${{ env.GHCR_REGISTRY_IMAGE }}",push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=${{ env.GHCR_REGISTRY_IMAGE }}:${{ env.PLATFORM_PAIR }}-${{ env.VERSION }}-buildcache
          cache-to: type=registry,ref=${{ env.GHCR_REGISTRY_IMAGE }}:${{ env.PLATFORM_PAIR }}-${{ env.VERSION }}-buildcache,mode=max


      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
    needs:
      - build
    steps:
      - name: Download digests
        uses: actions/download-artifact@v7
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set version
        run: |
          echo "VERSION=${{ needs.build.outputs.version }}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_REGISTRY_IMAGE }}
          tags: |
            type=raw,value=${{ env.VERSION }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          for build in ${GHCR_REGISTRY_IMAGE}; do
            docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
              $(printf "${build}@sha256:%s " *)
          done

      - name: Inspect image
        run: |
          for build in ${GHCR_REGISTRY_IMAGE}; do
            docker buildx imagetools inspect ${build}:${{ steps.meta.outputs.version }}
          done
