name: Windows
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'version number'
        required: false
        type: string
  push:
    branches: [ trunk ]
    paths: &shared_paths
    - '**'
    - '!**.yml'
    - '!**.md'
    - '**/windows.yml'

  pull_request:
    branches: [ trunk ]
    paths: *shared_paths

