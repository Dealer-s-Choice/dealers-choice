name: Deploy Docs
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

on:
  push:
    branches: [trunk]
    paths:
      - 'README.md'
      - 'docs/**'
      - 'scripts/extract_project_links.py'
      - '!**.yml'
      - '**/deploy-docs.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v6

      - name: Prepare files for deployment
        run: |
          mkdir deploy
          cp README.md deploy/
          cp -r docs deploy/
          python3 scripts/extract_project_links.py README.md deploy/_data/project_links.yml

      - name: Deploy to destination repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          external_repository: dealer-s-choice/dealer-s-choice.github.io
          publish_branch: trunk
          publish_dir: ./deploy
          keep_files: true
          enable_jekyll: true
          # Default exclude_assets is ".github"; that strips the website repo's
          # own workflows (e.g. update-screenshots-readme.yml) on every deploy.
          # Empty it so .github is preserved. The SSH deploy_key (not
          # GITHUB_TOKEN) is allowed to push workflow files.
          exclude_assets: ''
